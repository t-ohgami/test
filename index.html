<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="さんすう">
<meta name="theme-color" content="#E4E9E3">
<title>さんすう みえるばん</title>
<style>
:root{
  --desk:#E4E9E3;
  --paper:#FFFFFF;
  --grid:#DCE7E0;
  --ink:#26302E;
  --ink-soft:#6E7C78;
  --line:#C8D3CD;

  --ten:#2F6FB0;      /* 十のくらい */
  --ten-soft:#E0EBF7;
  --one:#DD8722;      /* 一のくらい */
  --one-soft:#FBECD8;
  --hun:#7657A6;      /* 百のくらい */
  --hun-soft:#EBE4F6;
  --red:#C7473F;      /* くりあがり・くりさがりの しるし */
  --ok:#3A8A61;
  --obj:#2C8580;      /* ながさで はかる もの */

  --u: clamp(13px, 4vw, 22px);     /* ブロック1こ */
  --g: 2px;
  --r: 6px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
/* ダブルタップ／連打での 拡大を とめる（ピンチでの 拡大は のこす） */
html{touch-action:manipulation;}
html,body{margin:0;padding:0;}
body{
  background:var(--desk);
  color:var(--ink);
  font-family:"UD デジタル 教科書体 NP-R","UD デジタル 教科書体 N-R","BIZ UDPGothic","Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Yu Gothic Medium","游ゴシック体",sans-serif;
  font-size:17px; line-height:1.6;
  padding:0 0 96px;
  -webkit-font-smoothing:antialiased;
}
h1{font-size:19px;margin:0;letter-spacing:.04em;}

/* ---------- ヘッダー / タブ ---------- */
header{
  position:sticky; top:0; z-index:20;
  background:var(--desk);
  padding:12px 14px 0;
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.brand small{color:var(--ink-soft);font-size:12px;letter-spacing:.08em;}
nav{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.tab{
  flex:0 0 auto;
  border:1px solid var(--line); border-bottom:none;
  background:#EEF2EE; color:var(--ink-soft);
  padding:9px 14px; border-radius:10px 10px 0 0;
  font-size:15px; cursor:pointer; font-family:inherit;
  translate:0 1px;
}
.tab[aria-selected="true"]{background:var(--paper); color:var(--ink); font-weight:700; box-shadow:0 -2px 0 var(--ten) inset;}

/* ---------- 用紙 ---------- */
main{padding:14px;max-width:820px;margin:0 auto;}
.paper{
  background:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size:20px 20px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px 14px;
  box-shadow:0 1px 0 #fff inset, 0 2px 6px rgba(40,60,55,.06);
}
.paper + .paper{margin-top:14px;}
.cap{
  font-size:12px;letter-spacing:.14em;color:var(--ink-soft);
  margin:0 0 10px;
}

/* ---------- 位取り板 ---------- */
.board{
  display:flex;gap:8px;align-items:flex-start;flex-wrap:nowrap;
  overflow-x:auto;overflow-y:hidden;padding-bottom:4px;
  scrollbar-width:thin;
}
.board > *{flex:0 0 auto;}
.pcol{
  border:1.5px solid var(--line); border-radius:10px;
  background:rgba(255,255,255,.75);
  padding:6px 7px 8px; min-height:96px;
  transition:box-shadow .2s, border-color .2s;
}
.pcol.on{border-color:currentColor; box-shadow:0 0 0 3px color-mix(in srgb, currentColor 18%, transparent);}
.pcol[data-p="ten"]{color:var(--ten);}
.pcol[data-p="one"]{color:var(--one);}
.pcol[data-p="hun"]{color:var(--hun);}
.phead{
  font-size:12px;font-weight:700;letter-spacing:.08em;
  display:flex;justify-content:space-between;gap:12px;align-items:baseline;
  margin-bottom:6px;
}
.phead b{font-size:17px;}

.strip{display:flex;gap:var(--g);padding:3px;border:2px solid var(--ten);border-radius:5px;background:var(--ten-soft);margin-bottom:5px;}
.strip .cube{background:var(--ten);}
.plate{
  width:calc(10*var(--u) + 9*var(--g) + 6px);
  height:calc(4*var(--u));
  border:2px solid var(--hun);border-radius:5px;background:var(--hun-soft);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--hun);margin-bottom:5px;
  background-image:linear-gradient(90deg,rgba(118,87,166,.22) 1px,transparent 1px),linear-gradient(rgba(118,87,166,.22) 1px,transparent 1px);
  background-size:calc((100% - 0px)/10) 25%;
}
.cube{
  width:var(--u); height:var(--u);
  background:var(--one); border-radius:3px;
  display:block;
}
.frame{
  display:grid;grid-template-columns:repeat(5,var(--u));gap:var(--g);
  padding:4px;border:1.5px dashed var(--line);border-radius:6px;
  position:relative;width:max-content;
}
.frame .slot{width:var(--u);height:var(--u);border-radius:3px;background:#F0F3F0;}
.frame.full{border-style:solid;border-color:var(--ten);background:var(--ten-soft);}
.frame.bundled .cube{background:var(--ten);}
.band{
  position:absolute;inset:-6px -8px;border:2.5px solid var(--ten);border-radius:8px;
  pointer-events:none;
}
.band::after{
  content:"10の たば";position:absolute;top:-11px;left:6px;
  background:var(--paper);color:var(--ten);font-size:11px;font-weight:700;padding:0 4px;
}
.spill{display:flex;flex-wrap:wrap;gap:var(--g);max-width:calc(5*var(--u) + 4*var(--g) + 8px);margin-top:7px;}
.cube.gone{background:#D7DCD8;position:relative;}
.cube.gone::after{content:"";position:absolute;inset:0;background:linear-gradient(45deg,transparent 44%,var(--red) 44%,var(--red) 56%,transparent 56%);}
.strip.gone{border-color:#C7CEC9;background:#EDF0EE;}
.strip.gone .cube{background:#D7DCD8;}
.strip.lend{border-style:dashed;}

/* 動きは2か所だけ（束ねる／送る） */
@keyframes bandIn{from{transform:scaleX(.2);opacity:0}to{transform:scaleX(1);opacity:1}}
@keyframes riseIn{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.anim-band{animation:bandIn .45s cubic-bezier(.22,.8,.3,1) both;}
.anim-rise{animation:riseIn .45s cubic-bezier(.22,.8,.3,1) both;}
@media (prefers-reduced-motion:reduce){.anim-band,.anim-rise{animation:none}}

.pairwrap{display:flex;flex-direction:column;gap:8px;}
.pairrow{display:flex;align-items:center;gap:10px;}
.pairop{font-size:26px;font-weight:700;color:var(--ink-soft);width:22px;text-align:center;}

/* ---------- 筆算 ---------- */
.hissan{display:inline-block;font-variant-numeric:tabular-nums;}
.hrow{display:flex;}
.hcell{
  width:2.1em;height:2.1em;font-size:26px;line-height:2.1em;text-align:center;
  position:relative;
}
.hcell.op{width:1.5em;color:var(--ink-soft);}
.hcell.p-one{background:var(--one-soft);}
.hcell.p-ten{background:var(--ten-soft);}
.hcell.p-hun{background:var(--hun-soft);}
.hrow.mark .hcell{height:1.1em;line-height:1.1em;font-size:15px;color:var(--red);background:none;font-weight:700;}
.hrow.bar{border-bottom:2.5px solid var(--ink);}
.hcell.cross::after{
  content:"";position:absolute;left:18%;right:18%;top:50%;
  border-top:2px solid var(--red);transform:rotate(-14deg);
}
.hcell.ans{font-weight:700;}
.hlabel{display:flex;margin-bottom:2px;}
.hlabel span{width:2.1em;text-align:center;font-size:11px;letter-spacing:.06em;color:var(--ink-soft);}
.hlabel span.sp{width:1.5em;}

/* ---------- ステップ帯 ---------- */
.stepbar{
  display:flex;gap:10px;align-items:flex-start;
  background:#F4F7F3;border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;margin-top:14px;
}
.stepno{
  flex:0 0 auto;font-size:12px;font-weight:700;color:var(--ink-soft);
  border:1px solid var(--line);border-radius:20px;padding:1px 9px;background:#fff;
}
.steptxt{font-size:17px;line-height:1.5;}
.steptxt em{font-style:normal;color:var(--red);font-weight:700;}
.steptxt b{color:var(--ten);}

/* ---------- ボタン ---------- */
/* 画面下に固定される「やること」パネル */
.controls{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--paper);
  border-top:2.5px solid var(--ten);
  box-shadow:0 -6px 20px rgba(40,60,55,.14);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  max-height:52vh;overflow-y:auto;
}
.dockmsg{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;}
.dockrow{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;}
.dockfb{
  min-height:2.4em;font-size:14px;line-height:1.2;color:var(--red);font-weight:700;
  display:flex;align-items:center;margin:-3px 0 7px;
}
.dockfb.ok{color:var(--ok);}
.controls .mini{margin-top:9px;}
.controls .actbtn{margin-top:0;width:100%;}
.controls .actrow{margin-top:0;}
.controls .keypad{margin-top:0;}
button{font-family:inherit;cursor:pointer;}
.btn{
  border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);
  border-radius:12px;padding:13px 20px;font-size:17px;font-weight:700;
  box-shadow:0 2px 0 var(--ink);
}
.btn:active{transform:translateY(2px);box-shadow:0 0 0 var(--ink);}
.btn.main{background:var(--ten);border-color:#1F5187;color:#fff;box-shadow:0 2px 0 #1F5187;min-width:9em;}
.btn.main:active{box-shadow:0 0 0 #1F5187;}
.btn.ghost{border-color:var(--line);box-shadow:none;font-weight:400;font-size:15px;padding:10px 14px;}
.btn:disabled{opacity:.35;box-shadow:none;transform:none;cursor:default;}
.mini{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.mini .btn{padding:9px 13px;font-size:15px;box-shadow:0 2px 0 var(--line);border-color:var(--line);}

/* ---------- 出題トレイ ---------- */
.tray{margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:14px;color:var(--ink-soft);}
.tray input{
  width:4.2em;font-family:inherit;font-size:20px;text-align:center;
  border:1.5px solid var(--line);border-radius:8px;padding:6px;background:#fff;color:var(--ink);
}
.note{font-size:13px;color:var(--ink-soft);margin-top:10px;}

/* ---------- ながさ ---------- */
.ruler{width:100%;height:auto;display:block;}
.zoomwrap{margin-top:12px;}
.zoomwrap h4{margin:0 0 5px;font-size:13px;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;}
.zoom{width:100%;height:auto;display:block;border:1.5px solid var(--line);border-radius:10px;background:#fff;}
.zoomgrid{display:grid;gap:10px;}
@media (min-width:601px){.zoomgrid.two{grid-template-columns:1fr 1fr;}}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper .val{
  min-width:2.6em;text-align:center;font-size:30px;font-weight:700;
  border-bottom:2px solid var(--line);
}
.stepper .unit{font-size:16px;color:var(--ink-soft);}
.sbtn{
  width:48px;height:48px;border-radius:12px;border:1.5px solid var(--line);
  background:#fff;font-size:22px;font-weight:700;color:var(--ink);box-shadow:0 2px 0 var(--line);
}
.sbtn:active{transform:translateY(2px);box-shadow:none;}
.ansrow{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:12px;}
.verdict{margin-top:12px;font-size:18px;font-weight:700;}
.verdict.ok{color:var(--ok);}
.verdict.ng{color:var(--red);}
.bridge{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:14px;}
.toggle{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--ink-soft);}
.pad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:340px;margin-top:10px;}
.pad button{padding:13px 0;font-size:19px;border:1.5px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 2px 0 var(--line);}
.padval{font-size:30px;font-weight:700;border-bottom:2px solid var(--line);min-width:3.5em;display:inline-block;text-align:center;}
:focus-visible{outline:3px solid var(--ten);outline-offset:2px;}

/* 画面に収める固定レイアウト（けいさん画面） */
body.fixed{overflow:hidden;height:100vh;height:100dvh;padding-bottom:0 !important;}
body.fixed main{padding:8px 10px 0;max-width:820px;}
#stage{position:relative;overflow:hidden;}
#stageinner{transform-origin:top center;}
#meas{position:absolute;left:-10000px;top:0;visibility:hidden;pointer-events:none;}
#blockpanel{display:flex;flex-direction:column;justify-content:center;}
.stampline{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);}
.stampline i{width:11px;height:11px;border-radius:50%;background:#DCE1DD;display:block;}
.stampline i.on{background:var(--one);}

/* 集中させたい方を大きく、そうでない方を小さく */
.hwrap.sm .hcell{font-size:17px;}
.hwrap.sm .hrow.mark .hcell{font-size:11px;}
.hwrap.sm .hlabel span{font-size:10px;}
.paper.dim{opacity:.92;}
.paper.dim .cap{margin-bottom:5px;}

/* ---------- ゲーム ---------- */
.task{border-color:var(--ten);}
.steptxt.big{font-size:21px;font-weight:700;line-height:1.5;}
.actbtn{
  margin-top:12px;border:1.5px solid #1F5187;background:var(--ten);color:#fff;
  border-radius:14px;padding:16px 26px;font-size:20px;font-weight:700;
  box-shadow:0 3px 0 #1F5187;
}
.actbtn:active{transform:translateY(3px);box-shadow:none;}
.actbtn.alt{background:#fff;color:var(--ink);border-color:var(--ink);box-shadow:0 3px 0 var(--ink);}
.actrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
.keypad{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;max-width:420px;margin-top:12px;}
.keypad button{
  padding:16px 0;font-size:26px;font-weight:700;font-family:inherit;
  border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);
  box-shadow:0 3px 0 var(--line);
}
.keypad button:active{transform:translateY(3px);box-shadow:none;}
.keypad button.hintkey{border-color:var(--ok);box-shadow:0 3px 0 var(--ok);color:var(--ok);}

.card{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.stampcard{
  display:grid;grid-template-columns:repeat(5,1fr);gap:5px;
  padding:7px;border:2px dashed var(--line);border-radius:10px;background:#fff;
  position:relative;width:max-content;
}
.stampcard.full{border-style:solid;border-color:var(--ten);background:var(--ten-soft);}
.stampcard .sl{
  width:38px;height:38px;border-radius:8px;background:#F1F4F1;
  display:flex;align-items:center;justify-content:center;font-size:21px;
}
.stampcard .sl.on{background:#fff;border:1.5px solid currentColor;}
.cardinfo{font-size:14px;color:var(--ink-soft);}
.cardinfo b{font-size:22px;color:var(--ink);}
.bundleshelf{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.bundleshelf i{
  width:22px;height:30px;border:2px solid var(--ten);background:var(--ten-soft);
  border-radius:4px;display:block;
}

/* ---------- スマホ ---------- */
@media (max-width:600px){
  body{font-size:16px;}
  h1{font-size:17px;}
  header{padding:7px 8px 0;}
  .brand{display:none;}
  main{padding:10px;}
  .paper{padding:12px 10px;border-radius:12px;}
  .paper + .paper{margin-top:10px;}
  .pcol{padding:5px 5px 7px;}
  .pairop{width:16px;font-size:20px;}
  .pairrow{gap:4px;}
  .pairwrap{gap:6px;}
  .hcell{font-size:22px;}
  .hrow.mark .hcell{font-size:13px;}
  .stepbar{padding:9px 10px;gap:8px;}
  .steptxt{font-size:16px;}
  .steptxt.big{font-size:19px;}
  .controls{padding:9px 10px calc(9px + env(safe-area-inset-bottom));}
  .dockmsg{gap:7px;margin-bottom:8px;}
  .stampcard .sl{width:28px;height:28px;font-size:16px;}
  .btn{padding:12px 14px;font-size:16px;}
  .btn.main{min-width:7.5em;}
  .btn.ghost{padding:9px 11px;font-size:14px;}
  .actbtn{padding:15px 18px;font-size:18px;width:100%;}
  .actrow .actbtn{width:auto;flex:1 1 44%;}
  .keypad{gap:7px;max-width:none;}
  .keypad button{padding:14px 0;font-size:23px;}
  .stampcard .sl{width:32px;height:32px;font-size:18px;}
  .sbtn{width:44px;height:44px;}
  .stepper .val{font-size:26px;min-width:2.2em;}
  .tray input{width:3.6em;font-size:18px;}
  .mini{gap:6px;}
  .cap{margin-bottom:8px;}
}
@media (max-height:560px){
  .controls{padding:7px 10px calc(7px + env(safe-area-inset-bottom));max-height:60vh;}
  .steptxt.big{font-size:17px;}
  .keypad button{padding:10px 0;font-size:20px;}
  .actbtn{padding:11px 14px;font-size:17px;}
  .cap{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>さんすう みえるばん</h1>
    <small>2ねんせい / くらい・ひっさん・ながさ</small>
  </div>
  <nav id="tabs" role="tablist"></nav>
</header>

<main id="app"></main>
<div class="controls" id="ctrl"></div>

<script>
"use strict";
/* =========================================================
   状態
   ========================================================= */
const S = {
  mode: "num",
  panel: null,
  num: { ten: 2, one: 3, msg: "" },
  card: { stamps: [], bundles: 0, justFull:false },
  add: { a: 38, b: 27, i: 0, play:false, g:{a:0,b:0,phase:"merge",tries:0,msg:"",ok:false,level:"carry"} },
  sub: { a: 52, b: 27, i: 0, play:false, g:{a:0,b:0,phase:"judge",tries:0,msg:"",ok:false,level:"carry"} },
  len: { target: 47, offset: 0, hard:false, kind:"read", cm:0, mm:0, pad:"", verdict:null, hint:"", blocks:true, spread:false }
};
const MODES = [
  { id:"num", label:"かずの しくみ", short:"かず" },
  { id:"add", label:"たしざん ひっさん", short:"たしざん" },
  { id:"sub", label:"ひきざん ひっさん", short:"ひきざん" },
  { id:"len", label:"ながさ", short:"ながさ" }
];

const $ = (s)=>document.querySelector(s);
let NARROW = window.innerWidth < 600;
const RULER_CM = ()=> NARROW ? 10 : 15;
const app = $("#app"), ctrl = $("#ctrl");

/* =========================================================
   ブロック描画（位取り板）
   ========================================================= */
function cube(cls){ return `<span class="cube ${cls||""}"></span>`; }

function strip(opts){
  const o = opts||{};
  return `<div class="strip ${o.cls||""}">${cube().repeat(10)}</div>`;
}
function plate(){ return `<div class="plate">100</div>`; }

/* 一のくらい：10のわく + あふれ */
function onesArea(n, o){
  o = o||{};
  const inFrame = Math.min(n, 10);
  const extra   = Math.max(0, n - 10);
  const gone    = Math.min(o.gone||0, n);      // うしろ（あふれ→わく）から とりのぞく
  const goneSpill = Math.min(gone, extra);
  const goneFrame = gone - goneSpill;
  let slots = "";
  for(let i=0;i<10;i++){
    const filled = i < inFrame;
    const isGone = filled && (i >= inFrame - goneFrame);
    slots += filled ? `<div class="slot">${cube(isGone?"gone":"")}</div>` : `<div class="slot"></div>`;
  }
  const full = inFrame===10;
  const band = o.band ? `<div class="band anim-band"></div>` : "";
  let spill = "";
  if(extra>0){
    let c="";
    for(let i=0;i<extra;i++) c += cube(i >= extra-goneSpill ? "gone" : "");
    spill = `<div class="spill">${c}</div>`;
  }
  return `<div class="frame ${full?"full":""} ${o.band?"bundled":""}">${slots}${band}</div>${spill}`;
}

/* 位取り板 1枚 */
function placeBoard(v){
  // v: {hun,ten,one, oneOpt, on:'one'|'ten'|'hun', goneTen, lendTen}
  const hun = v.hun||0, ten = v.ten||0, one = v.one||0;
  let hunHtml = "";
  if(hun>0){
    hunHtml = `<div class="pcol ${v.on==="hun"?"on":""}" data-p="hun">
      <div class="phead"><span>百のくらい</span><b>${hun}</b></div>
      ${plate().repeat(hun)}
    </div>`;
  }
  let strips = "";
  for(let i=0;i<ten;i++){
    const isGone = i >= ten - (v.goneTen||0);
    const isLend = v.lendTen && i === ten-1;
    strips += strip({cls:(isGone?"gone":"") + (isLend?" lend anim-rise":"") + (v.newTen && i===ten-1 ? " anim-rise":"")});
  }
  return `<div class="board">
    ${hunHtml}
    <div class="pcol ${v.on==="ten"?"on":""}" data-p="ten">
      <div class="phead"><span>十のくらい</span><b>${ten}</b></div>
      ${strips || `<div style="height:calc(var(--u) + 8px)"></div>`}
    </div>
    <div class="pcol ${v.on==="one"?"on":""}" data-p="one">
      <div class="phead"><span>一のくらい</span><b>${one}</b></div>
      ${onesArea(one, v.oneOpt||{})}
    </div>
  </div>`;
}

/* =========================================================
   筆算描画
   ========================================================= */
function hissan(h){
  // h: {cols:['hun','ten','one'], op, a:{}, b:{}, ans:{}, mark:{}, cross:{}}
  const cols = h.cols;
  const cls = {hun:"p-hun", ten:"p-ten", one:"p-one"};
  const lab = {hun:"百", ten:"十", one:"一"};
  const cell = (p, txt, extra) => `<div class="hcell ${cls[p]} ${extra||""}">${txt??""}</div>`;

  const labels = `<div class="hlabel"><span class="sp"></span>${cols.map(p=>`<span>${lab[p]}</span>`).join("")}</div>`;
  const markRow = `<div class="hrow mark"><div class="hcell op"></div>${
    cols.map(p=>`<div class="hcell ${cls[p]}">${(h.mark&&h.mark[p])??""}</div>`).join("")}</div>`;
  const rowA = `<div class="hrow"><div class="hcell op"></div>${
    cols.map(p=>cell(p, h.a[p], h.cross&&h.cross[p]?"cross":"")).join("")}</div>`;
  const rowB = `<div class="hrow bar"><div class="hcell op">${h.op}</div>${
    cols.map(p=>cell(p, h.b[p])).join("")}</div>`;
  const rowAns = `<div class="hrow"><div class="hcell op"></div>${
    cols.map(p=>cell(p, h.ans[p], "ans")).join("")}</div>`;
  return `<div class="hissan">${labels}${markRow}${rowA}${rowB}${rowAns}</div>`;
}
const dig = (n, place) => {
  if(n===null||n===undefined) return "";
  const s = String(n);
  const idx = {one:1, ten:2, hun:3}[place];
  return s.length>=idx ? s[s.length-idx] : "";
};

/* =========================================================
   たしざん：ステップ生成
   ========================================================= */
function addSteps(a,b){
  const oa=a%10, ta=Math.floor(a/10)%10, ha=Math.floor(a/100);
  const ob=b%10, tb=Math.floor(b/10)%10, hb=Math.floor(b/100);
  const sum=a+b;
  const oneSum=oa+ob, carry1 = oneSum>=10 ? 1 : 0;
  const tenSum=ta+tb+carry1, carry2 = tenSum>=10 ? 1 : 0;
  const cols = sum>=100 ? ["hun","ten","one"] : ["ten","one"];
  const base = { cols, op:"＋",
    a:{one:dig(a,"one"), ten:dig(a,"ten"), hun:dig(a,"hun")},
    b:{one:dig(b,"one"), ten:dig(b,"ten"), hun:dig(b,"hun")},
    ans:{}, mark:{} };
  const H = (o)=>Object.assign(JSON.parse(JSON.stringify(base)), o||{});
  const st=[];

  st.push({
    txt:`<b>${a}</b> と <b>${b}</b> を ブロックで みてみよう。おなじ くらい どうしを たすよ。`,
    board:{pair:[{ten:ta+ha*10,one:oa,label:a},{ten:tb+hb*10,one:ob,label:b}]},
    h:H()
  });
  st.push({
    txt:`一のくらいから けいさん。<b>${oa} ＋ ${ob} ＝ ${oneSum}</b>`,
    board:{one:{ten:ta+tb+(ha+hb)*10, one:oneSum, on:"one"}},
    h:H()
  });

  if(carry1){
    st.push({
      txt:`一のくらいが 10 に なった。<em>10こ を 1つの たばに する</em>。`,
      board:{one:{ten:ta+tb+(ha+hb)*10, one:oneSum, on:"one", oneOpt:{band:true}}},
      h:H()
    });
    st.push({
      txt:`たばを 十のくらいへ おくる。これが <em>くりあがり</em>。のこりの <b>${oneSum-10}</b> を 一のくらいに かく。`,
      board:{one:{ten:ta+tb+1+(ha+hb)*10, one:oneSum-10, on:"ten", newTen:true}},
      h:H({mark:{ten:"1"}, ans:{one:String(oneSum-10)}})
    });
  }else{
    st.push({
      txt:`一のくらいの こたえは <b>${oneSum}</b>。そのまま かくよ。`,
      board:{one:{ten:ta+tb+(ha+hb)*10, one:oneSum, on:"one"}},
      h:H({ans:{one:String(oneSum)}})
    });
  }

  const tenTxt = carry1 ? `<em>1</em> ＋ ${ta} ＋ ${tb} ＝ ${tenSum}` : `${ta} ＋ ${tb} ＝ ${tenSum}`;
  st.push({
    txt:`つぎは 十のくらい。<b>${tenTxt}</b>`,
    board:{one:{hun:ha+hb, ten:tenSum, one:oneSum%10, on:"ten"}},
    h:H({mark:carry1?{ten:"1"}:{}, ans:{one:String(oneSum%10)}})
  });

  if(carry2){
    st.push({
      txt:`十のくらいも 10 に なった。<em>10たば を 1まいの 100に して 百のくらいへ</em>。`,
      board:{one:{hun:ha+hb+1, ten:tenSum-10, one:oneSum%10, on:"hun"}},
      h:H({mark:{ten:carry1?"1":"", hun:"1"}, ans:{one:String(oneSum%10), ten:String(tenSum-10)}})
    });
  }

  st.push({
    txt:`できた。<b>${a} ＋ ${b} ＝ ${sum}</b>`,
    board:{one:{hun:Math.floor(sum/100), ten:Math.floor(sum/10)%10, one:sum%10}},
    h:H({mark:{ten:carry1?"1":"", hun:carry2?"1":""},
         ans:{one:dig(sum,"one"), ten:dig(sum,"ten"), hun:dig(sum,"hun")}})
  });
  return st;
}

/* =========================================================
   ひきざん：ステップ生成
   ========================================================= */
function subSteps(a,b){
  const oa=a%10, ta=Math.floor(a/10);
  const ob=b%10, tb=Math.floor(b/10);
  const need = oa < ob;
  const diff = a-b;
  const cols = ["ten","one"];
  const base = { cols, op:"－",
    a:{one:String(oa), ten:ta?String(ta):""},
    b:{one:String(ob), ten:tb?String(tb):""},
    ans:{}, mark:{}, cross:{} };
  const H=(o)=>Object.assign(JSON.parse(JSON.stringify(base)), o||{});
  const st=[];

  st.push({
    txt:`<b>${a}</b> から <b>${b}</b> を とるよ。まず ${a} を ブロックに するね。`,
    board:{one:{ten:ta, one:oa}},
    h:H()
  });

  if(need){
    st.push({
      txt:`一のくらいを みると <b>${oa} － ${ob}</b>。<em>これは ひけない</em>。`,
      board:{one:{ten:ta, one:oa, on:"one"}},
      h:H()
    });
    st.push({
      txt:`そこで 十のくらいから <em>たばを 1つ かりる</em>。十のくらいは ${ta} → <b>${ta-1}</b>。`,
      board:{one:{ten:ta, one:oa, on:"ten", lendTen:true}},
      h:H({cross:{ten:true}, mark:{ten:String(ta-1)}})
    });
    st.push({
      txt:`かりた たばを <em>ばらすと 1が 10こ</em>。一のくらいは <b>${oa+10}</b> に なった。`,
      board:{one:{ten:ta-1, one:oa+10, on:"one"}},
      h:H({cross:{ten:true}, mark:{ten:String(ta-1)}})
    });
    st.push({
      txt:`<b>${oa+10} － ${ob} ＝ ${oa+10-ob}</b>。とった ぶんに ばつが つくよ。`,
      board:{one:{ten:ta-1, one:oa+10, on:"one", oneOpt:{gone:ob}}},
      h:H({cross:{ten:true}, mark:{ten:String(ta-1)}, ans:{one:String(oa+10-ob)}})
    });
    st.push({
      txt:`さいごに 十のくらい。<b>${ta-1} － ${tb} ＝ ${Math.floor(diff/10)}</b>`,
      board:{one:{ten:ta-1, one:oa+10-ob, on:"ten", goneTen:tb}},
      h:H({cross:{ten:true}, mark:{ten:String(ta-1)}, ans:{one:String(oa+10-ob), ten:Math.floor(diff/10)?String(Math.floor(diff/10)):""}})
    });
  }else{
    st.push({
      txt:`一のくらい <b>${oa} － ${ob} ＝ ${oa-ob}</b>。そのまま ひけるね。`,
      board:{one:{ten:ta, one:oa, on:"one", oneOpt:{gone:ob}}},
      h:H({ans:{one:String(oa-ob)}})
    });
    st.push({
      txt:`十のくらい <b>${ta} － ${tb} ＝ ${ta-tb}</b>`,
      board:{one:{ten:ta, one:oa-ob, on:"ten", goneTen:tb}},
      h:H({ans:{one:String(oa-ob), ten:(ta-tb)?String(ta-tb):""}})
    });
  }

  st.push({
    txt:`できた。<b>${a} － ${b} ＝ ${diff}</b>`,
    board:{one:{ten:Math.floor(diff/10), one:diff%10}},
    h:H(need?{cross:{ten:true}, mark:{ten:String(ta-1)}}:{})
  });
  st[st.length-1].h.ans = {one:String(diff%10), ten:Math.floor(diff/10)?String(Math.floor(diff/10)):""};
  return st;
}

function readNum(n){
  const t=Math.floor(n/10), o=n%10;

  return (T[t]||"") + (O[o]||"");
}

/* ものさしの めもりに ぴったり 合わせた ブロック。
   1cm = あおい たば（1が10こ）、はんぱ = オレンジの 1 */
function objBlocks(offMm, lenMm, U, L, y, h, fs){
  const cm=Math.floor(lenMm/10), mm=lenMm%10;
  const g=Math.max(0.8, U*0.11);
  const r=Math.min(5, U*0.22);
  let out="";
  for(let i=0;i<cm;i++){
    const x=L+(offMm+i*10)*U;
    out+=`<rect x="${x}" y="${y}" width="${10*U}" height="${h}" rx="${Math.min(9,U*0.4)}" fill="#DCE9F6" stroke="#2F6FB0" stroke-width="${Math.max(2.4,U*0.2)}"/>`;
    for(let k=0;k<10;k++){
      out+=`<rect x="${x+k*U+g}" y="${y+g*2.2}" width="${U-2*g}" height="${h-4.4*g}" rx="${r}" fill="#2F6FB0"/>`;
    }
  }
  for(let j=0;j<mm;j++){
    const x=L+(offMm+cm*10+j)*U;
    out+=`<rect x="${x+g}" y="${y+g*2.2}" width="${U-2*g}" height="${h-4.4*g}" rx="${r}" fill="#DD8722"/>`;
  }
  if(fs){
    if(cm>0) out+=`<text x="${L+(offMm+cm*5)*U}" y="${y-6}" font-size="${fs}" text-anchor="middle" fill="#2F6FB0" font-weight="bold">たば ${cm}こ ＝ ${cm}cm</text>`;
    if(mm>0) out+=`<text x="${L+(offMm+cm*10+mm/2)*U}" y="${y+h+fs*1.05}" font-size="${fs}" text-anchor="middle" fill="#DD8722" font-weight="bold">${mm}mm</text>`;
  }
  return out;
}

/* 1cm の たば と 1mm が10こ を 同じ幅で 並べた 図 */
function bridgeSvg(){
  const U=44, L=14, W=L*2+10*U, T=14, H=48, B=104;
  let strip=`<rect x="${L}" y="${T}" width="${10*U}" height="${H}" rx="10" fill="#DCE9F6" stroke="#2F6FB0" stroke-width="4"/>`;
  for(let k=0;k<10;k++) strip+=`<rect x="${L+k*U+5}" y="${T+9}" width="${U-10}" height="${H-18}" rx="5" fill="#2F6FB0"/>`;
  let cubes="";
  for(let k=0;k<10;k++) cubes+=`<rect x="${L+k*U+5}" y="${B}" width="${U-10}" height="${H-18}" rx="5" fill="#DD8722"/>`;
  const guide=`<line x1="${L}" y1="${T-6}" x2="${L}" y2="${B+H}" stroke="#9AA8A3" stroke-width="2.5" stroke-dasharray="8 7"/>
    <line x1="${L+10*U}" y1="${T-6}" x2="${L+10*U}" y2="${B+H}" stroke="#9AA8A3" stroke-width="2.5" stroke-dasharray="8 7"/>`;
  return `<svg viewBox="0 0 ${W} 172" style="width:100%;height:auto;display:block">
    ${guide}${strip}${cubes}
    <text x="${L+10*U/2}" y="${T+H+26}" font-size="26" text-anchor="middle" fill="#6E7C78">おなじ ながさ</text>
  </svg>`;
}

/* cm↔mm 変換用：たば と はんぱ を 並べる。spread=true で ぜんぶ ばらす */
function blockRowSvg(cm, mm, spread){
  const U=30, H=54, T=16, PAD=12, GG=22;
  let x=PAD, out="", labels="";
  const cube=(px,color)=>`<rect x="${px+2}" y="${T+4}" width="${U-4}" height="${H-8}" rx="5" fill="${color}"/>`;
  if(!spread){
    for(let i=0;i<cm;i++){
      out+=`<rect x="${x}" y="${T}" width="${10*U}" height="${H}" rx="9" fill="#DCE9F6" stroke="#2F6FB0" stroke-width="4"/>`;
      for(let k=0;k<10;k++) out+=cube(x+k*U,"#2F6FB0");
      x+=10*U+GG;
    }
    for(let j=0;j<mm;j++){ out+=cube(x,"#DD8722"); x+=U; }
  }else{
    let total=0;
    for(let i=0;i<cm;i++){
      for(let k=0;k<10;k++) out+=cube(x+k*U,"#DD8722");
      total+=10;
      labels+=`<text x="${x+10*U-U/2}" y="${T+H+34}" font-size="27" text-anchor="middle" fill="#6E7C78">${total}</text>`;
      x+=10*U+GG;
    }
    for(let j=0;j<mm;j++){ out+=cube(x,"#DD8722"); x+=U; }
    if(mm>0){ total+=mm; labels+=`<text x="${x-U/2}" y="${T+H+34}" font-size="27" text-anchor="middle" fill="#DD8722" font-weight="bold">${total}</text>`; }
  }
  return `<svg viewBox="0 0 ${x+PAD} ${T+H+(spread?46:14)}" style="width:100%;height:auto;display:block">${out}${labels}</svg>`;
}

function ruler(lenMm, offMm, showAns){
  const MAXMM = RULER_CM()*10;
  const U=10, L=40, TOP=118, H=86;
  const W = L*2 + MAXMM*U;
  // スマホでは 1mm ごとの めもりは つぶれて 読めないので 5mm きざみに 間引く
  const stepT = NARROW ? 5 : 1;
  const sw = NARROW ? {big:7, mid:4.5} : {big:3, mid:2.2, sml:1.6};
  let ticks="";
  for(let i=0;i<=MAXMM;i+=stepT){
    const x = L + i*U;
    const big = i%10===0, mid = i%5===0;
    const h = big?44:(mid?26:15);
    const w = big?sw.big:(mid?sw.mid:sw.sml);
    ticks += `<line x1="${x}" y1="${TOP}" x2="${x}" y2="${TOP+h}" stroke="#4A5A57" stroke-width="${w}"/>`;
    if(big) ticks += `<text x="${x}" y="${TOP+72}" font-size="${NARROW?38:30}" text-anchor="middle" fill="#4A5A57">${i/10}</text>`;
  }
  const bx = L + offMm*U, bw = lenMm*U;
  const ans = showAns ? `
    <line x1="${bx}" y1="${TOP-8}" x2="${bx}" y2="${TOP+56}" stroke="#C7473F" stroke-width="3" stroke-dasharray="7 6"/>
    <line x1="${bx+bw}" y1="${TOP-8}" x2="${bx+bw}" y2="${TOP+56}" stroke="#C7473F" stroke-width="3" stroke-dasharray="7 6"/>` : "";
  const obj = S.len.blocks
    ? objBlocks(offMm, lenMm, U, L, 26, 60, showAns?34:0)
    : `<rect x="${bx}" y="34" width="${bw}" height="46" rx="10" fill="var(--obj)"/>`;
  return `<svg class="ruler" viewBox="0 0 ${W} 230" role="img" aria-label="ものさし">
    ${obj}
    <rect x="${L}" y="${TOP}" width="${MAXMM*U}" height="${H}" fill="#EDF4F2" stroke="#4A5A57" stroke-width="2.5"/>
    ${ticks}${ans}
    <text x="${L+2}" y="${TOP-10}" font-size="${NARROW?30:24}" fill="#6E7C78">0</text>
  </svg>`;
}

/* 指定の mm 位置まわりを 大きく見せる まど（20mm分） */
function magnify(centerMm, lenMm, offMm, title){
  const MAXMM = RULER_CM()*10, SPAN = 20, U = 46, L = 26, TOP = 96, H = 74;
  let a = Math.round(centerMm) - SPAN/2;
  a = Math.max(0, Math.min(MAXMM - SPAN, a));
  const W = L*2 + SPAN*U;
  const px = (mm)=> L + (mm - a)*U;
  let ticks="";
  for(let i=a;i<=a+SPAN;i++){
    const x=px(i), big=i%10===0, mid=i%5===0;
    const h = big?40:(mid?26:16);
    ticks += `<line x1="${x}" y1="${TOP}" x2="${x}" y2="${TOP+h}" stroke="#4A5A57" stroke-width="${big?4:(mid?3:2)}"/>`;
    if(big) ticks += `<text x="${x}" y="${TOP+66}" font-size="30" text-anchor="middle" fill="#4A5A57">${i/10}</text>`;
  }
  const s0 = Math.max(a, offMm), s1 = Math.min(a+SPAN, offMm+lenMm);
  let bar = s1>s0 ? `<rect x="${px(s0)}" y="30" width="${(s1-s0)*U}" height="42" rx="8" fill="var(--obj)"/>` : "";
  if(S.len.blocks){
    bar = `<g clip-path="url(#clip${Math.round(a)})">${objBlocks(offMm, lenMm, U, L-(a*U), 22, 56, 0)}</g>`;
  }
  const mark = `<line x1="${px(centerMm)}" y1="20" x2="${px(centerMm)}" y2="${TOP+50}" stroke="#C7473F" stroke-width="4"/>`;
  return `<div class="zoomwrap"><h4>${title}</h4>
    <svg class="zoom" viewBox="0 0 ${W} 190" role="img" aria-label="${title}">
      <defs><clipPath id="clip${Math.round(a)}"><rect x="${L}" y="0" width="${SPAN*U}" height="190"/></clipPath></defs>
      <rect x="${L}" y="${TOP}" width="${SPAN*U}" height="${H}" fill="#EDF4F2" stroke="#4A5A57" stroke-width="3"/>
      ${bar}${ticks}${mark}
    </svg></div>`;
}

/* =========================================================
   ゲームモード
   ========================================================= */
const STAMPS = ["◎","★","☺","♪","✿","●","▲","✚","☀","■"];

function gInit(kind){
  const g = S[kind].g, lv = g.level;
  let a=0,b=0;
  for(let k=0;k<800;k++){
    if(kind==="add"){
      a = 10+Math.floor(Math.random()*80); b = 10+Math.floor(Math.random()*80);
      if(a+b>99) continue;
      const c = (a%10 + b%10) >= 10;
      if(lv==="mix" || (lv==="carry")===c) break;
    }else{
      a = 21+Math.floor(Math.random()*79);
      b = 10+Math.floor(Math.random()*90);
      if(a-b<=0) continue;
      const oa=a%10, ob=b%10, ta=Math.floor(a/10), tb=Math.floor(b/10);
      const need = oa<ob;
      if((ta-(need?1:0)-tb) < 1) continue;      // こたえが 2けたに なるように
      if(lv==="mix" || (lv==="carry")===need) break;
    }
  }
  g.a=a; g.b=b; g.tries=0; g.msg=""; g.ok=false;
  g.phase = kind==="add" ? "merge" : "judge";
}

function gPhases(kind){
  const g=S[kind].g, oa=g.a%10, ob=g.b%10, ta=Math.floor(g.a/10), tb=Math.floor(g.b/10);
  if(kind==="add"){
    const c1 = oa+ob>=10, c2 = ta+tb+(c1?1:0)>=10;
    const p=["merge"]; if(c1) p.push("bundle","send");
    p.push("ansOne","ansTen"); if(c2) p.push("ansHun"); p.push("done");
    return p;
  }
  const need = oa<ob;
  return ["judge"].concat(need?["borrow","break"]:[]).concat(["ansOne","ansTen","done"]);
}
function gStep(kind, dir){
  const g=S[kind].g, p=gPhases(kind), i=p.indexOf(g.phase);
  g.phase = p[Math.min(p.length-1, i+(dir||1))];
  g.tries=0; g.msg=""; g.ok=false;   // 前のステップの ことばを 残さない
}
function gExpect(kind){
  const g=S[kind].g, oa=g.a%10, ob=g.b%10, ta=Math.floor(g.a/10), tb=Math.floor(g.b/10);
  if(kind==="add"){
    const c1 = oa+ob>=10 ? 1:0;
    if(g.phase==="ansOne") return (oa+ob)%10;
    if(g.phase==="ansTen") return (ta+tb+c1)%10;
    if(g.phase==="ansHun") return 1;
  }else{
    const need = oa<ob ? 1:0;
    if(g.phase==="ansOne") return oa+need*10-ob;
    if(g.phase==="ansTen") return ta-need-tb;
  }
  return null;
}

function gFrame(kind){
  const g=S[kind].g;
  const oa=g.a%10, ob=g.b%10, ta=Math.floor(g.a/10), tb=Math.floor(g.b/10);
  const ph=g.phase;
  const H = (o)=>Object.assign({
    cols:(kind==="add"&&g.a+g.b>=100)?["hun","ten","one"]:["ten","one"],
    op:kind==="add"?"＋":"－",
    a:{one:String(oa), ten:ta?String(ta):""},
    b:{one:String(ob), ten:tb?String(tb):""},
    ans:{}, mark:{}, cross:{}
  }, o||{});
  const pair = (t1,o1,t2,o2)=>`<div class="pairwrap">
      <div class="pairrow"><div class="pairop"></div>${placeBoard({ten:t1,one:o1})}</div>
      <div class="pairrow"><div class="pairop">${kind==="add"?"＋":"－"}</div>${placeBoard({ten:t2,one:o2})}</div>
    </div>`;
  const btn=(label,act)=>`<button class="actbtn" data-act="gact" data-v="${act}">${label}</button>`;
  const pad=(hint)=>`<div class="keypad">${
    [1,2,3,4,5,6,7,8,9,0].map(d=>`<button data-act="gkey" data-v="${d}" class="${hint===d?"hintkey":""}">${d}</button>`).join("")}</div>`;

  if(kind==="add"){
    const c1 = oa+ob>=10?1:0, sumOne=oa+ob, sumTen=ta+tb+c1;
    switch(ph){
      case "merge": return {board:pair(ta,oa,tb,ob), h:H(),
        instr:`一のくらいの ブロックを ひとつに あつめよう。`, ui:btn("あつめる","merge")};
      case "bundle": return {board:placeBoard({ten:ta+tb,one:sumOne,on:"one"}), h:H(),
        instr:`一のくらいが <b>${sumOne}</b>こ。わくが いっぱいだね。10こを たばに しよう。`, ui:btn("10こを たばに する","bundle")};
      case "send": return {board:placeBoard({ten:ta+tb,one:sumOne,on:"one",oneOpt:{band:true}}), h:H(),
        instr:`たばが できた。十のくらいへ おくろう（くりあがり）。`, ui:btn("十のくらいへ おくる","send")};
      case "ansOne": return {board:placeBoard({ten:ta+tb+c1,one:sumOne-10*c1,on:"one"}), h:H({mark:c1?{ten:"1"}:{}}),
        instr:`一のくらいの こたえは？`, ui:pad(g.tries>=3?sumOne%10:null)};
      case "ansTen": return {board:placeBoard({ten:sumTen,one:sumOne%10,on:"ten"}), h:H({mark:c1?{ten:"1"}:{}, ans:{one:String(sumOne%10)}}),
        instr:`十のくらいは ${c1?`<em>1</em> ＋ `:""}${ta} ＋ ${tb}。こたえは？`, ui:pad(g.tries>=3?sumTen%10:null)};
      case "ansHun": return {board:placeBoard({hun:1,ten:sumTen-10,one:sumOne%10,on:"hun"}), h:H({mark:{ten:c1?"1":"",hun:"1"},ans:{one:String(sumOne%10),ten:String(sumTen-10)}}),
        instr:`百のくらいに くりあがり。こたえは？`, ui:pad(g.tries>=3?1:null)};
      default: {
        const t=g.a+g.b;
        return {board:placeBoard({hun:Math.floor(t/100),ten:Math.floor(t/10)%10,one:t%10}),
          h:H({mark:{ten:c1?"1":""}, ans:{one:dig(t,"one"),ten:dig(t,"ten"),hun:dig(t,"hun")}}),
          instr:`<span style="color:var(--ok)">できた！</span> <b>${g.a} ＋ ${g.b} ＝ ${t}</b>`, ui:btn("つぎの もんだい","next")};
      }
    }
  }else{
    const need = oa<ob;
    switch(ph){
      case "judge": return {board:placeBoard({ten:ta,one:oa,on:"one"}), h:H(),
        instr:`一のくらいは <b>${oa} － ${ob}</b>。そのまま ひける？`,
        ui:`<div class="actrow">${btn("ひける","yes")}${btn("ひけない","no")}</div>`};
      case "borrow": return {board:placeBoard({ten:ta,one:oa,on:"ten"}), h:H(),
        instr:`ひけないね。十のくらいから たばを 1つ かりよう。`, ui:btn("たばを かりる","borrow")};
      case "break": return {board:placeBoard({ten:ta,one:oa,on:"ten",lendTen:true}), h:H({cross:{ten:true},mark:{ten:String(ta-1)}}),
        instr:`かりた たばを ばらすと、1が いくつに なるかな。`, ui:btn("たばを ばらす","break")};
      case "ansOne": return {board:placeBoard({ten:ta-(need?1:0),one:oa+(need?10:0),on:"one"}),
        h:H(need?{cross:{ten:true},mark:{ten:String(ta-1)}}:{}),
        instr:`<b>${oa+(need?10:0)} － ${ob}</b> は？`, ui:pad(g.tries>=3?gExpect("sub"):null)};
      case "ansTen": return {board:placeBoard({ten:ta-(need?1:0),one:oa+(need?10:0)-ob,on:"ten",goneTen:tb}),
        h:H(Object.assign(need?{cross:{ten:true},mark:{ten:String(ta-1)}}:{},{ans:{one:String(oa+(need?10:0)-ob)}})),
        instr:`十のくらいは <b>${ta-(need?1:0)} － ${tb}</b>。こたえは？`, ui:pad(g.tries>=3?gExpect("sub"):null)};
      default: {
        const t=g.a-g.b;
        return {board:placeBoard({ten:Math.floor(t/10),one:t%10}),
          h:H(Object.assign(need?{cross:{ten:true},mark:{ten:String(ta-1)}}:{},{ans:{one:String(t%10),ten:String(Math.floor(t/10))}})),
          instr:`<span style="color:var(--ok)">できた！</span> <b>${g.a} － ${g.b} ＝ ${t}</b>`, ui:btn("つぎの もんだい","next")};
      }
    }
  }
}

function cardBody(){
  const c=S.card, full=c.stamps.length>=10;
  let slots="";
  for(let i=0;i<10;i++){
    const st=c.stamps[i];
    slots += st ? `<div class="sl on" style="color:${st.c}">${st.s}</div>` : `<div class="sl"></div>`;
  }
  return `<div class="card">
      <div class="stampcard ${full?"full":""}">${slots}</div>
      <div class="cardinfo">
        いま <b>${c.stamps.length}</b> / 10 こ<br>
        できた たば：<b>${c.bundles}</b>
        <div class="bundleshelf">${"<i></i>".repeat(Math.min(c.bundles,20))}</div>

    ${c.justFull?`<p class="verdict ok">10こ たまった！ スタンプ10こ ＝ たば1つ。くらいと おなじだね。</p>`:""}`;

function stampLine(){
  const c=S.card;
  let d=""; for(let i=0;i<10;i++) d += `<i class="${i<c.stamps.length?"on":""}"></i>`;
  return `<span class="stampline">${d} ${c.stamps.length}/10${c.bundles?`　たば ${c.bundles}`:""}</span>`;
}
function addStamp(){
  const c=S.card;
  c.stamps.push({s:STAMPS[c.stamps.length%STAMPS.length], c:["#DD8722","#2F6FB0","#7657A6","#3A8A61","#C7473F"][c.stamps.length%5]});
  c.justFull=false;
  if(c.stamps.length>=10){ c.bundles++; c.stamps=[]; c.justFull=true; }
}

function renderTabs(){
  $("#tabs").innerHTML = MODES.map(m=>
    `<button class="tab" role="tab" aria-selected="${S.mode===m.id}" data-act="tab" data-v="${m.id}">${NARROW?m.short:m.label}</button>`
  ).join("");
}
let LAYOUT = null;
function render(){
  renderTabs();
  LAYOUT = null;
  if(S.mode==="num") viewNum();
  else if(S.mode==="add") viewCalc("add");
  else if(S.mode==="sub") viewCalc("sub");
  else viewLen();

  const empty = ctrl.innerHTML.trim()==="";
  ctrl.style.display = empty ? "none" : "block";
  const fixed = !!LAYOUT;
  document.body.classList.toggle("fixed", fixed);
  requestAnimationFrame(()=>{
    if(!fixed){
      document.body.style.paddingBottom = empty ? "28px" : (ctrl.offsetHeight + 18) + "px";
      return;
    }
    document.body.style.paddingBottom = "0px";
    fitStage();
  });
}

/* けいさん画面を 画面内に 収める。
   この問題の 全ステップぶんの ブロック板を 先に 測って 高さを 固定するので、
   ステップが 進んでも 筆算の 位置は 動かない（＝画面が とばない）。 */
function fitStage(){
  const stage=document.getElementById("stage"),
        inner=document.getElementById("stageinner"),
        meas =document.getElementById("meas"),
        bp   =document.getElementById("blockpanel"),
        head =document.querySelector("header");
  if(!stage||!inner||!meas||!bp||!LAYOUT) return;

  const vh = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  const avail = Math.max(170, vh - head.offsetHeight - ctrl.offsetHeight - 14);
  stage.style.height = avail + "px";

  inner.style.transform = "none";
  bp.style.minHeight = "";
  meas.style.width = inner.clientWidth + "px";

  let maxB = 0;
  for(const html of LAYOUT.heights){
    meas.innerHTML = `<section class="paper">${html}</section>`;
    maxB = Math.max(maxB, meas.firstElementChild.offsetHeight);
  }
  meas.innerHTML = "";
  bp.style.minHeight = maxB + "px";

  const nat = inner.scrollHeight;
  let k = Math.min(1, avail / nat);
  k = Math.max(0.5, k);
  inner.style.transform = k < 1 ? `scale(${k})` : "none";
  stage.style.overflowY = (nat * k > avail + 1) ? "auto" : "hidden";
}

function newLen(){
  const L=S.len;
  const MAX = RULER_CM()*10;
  L.offset = L.hard ? (1 + Math.floor(Math.random()*2))*10 : 0;
  L.target = 12 + Math.floor(Math.random()*(MAX - L.offset - 17));
  if(L.offset + L.target > MAX){ L.offset = 0; L.target = Math.min(L.target, MAX-5); }
  L.cm=0; L.mm=0; L.pad=""; L.verdict=null; L.hint=""; L.spread=false;
}

document.addEventListener("click", (e)=>{
  const t = e.target.closest("[data-act]");
  if(!t) return;
  const act = t.dataset.act, v = t.dataset.v;
  const L = S.len;

  switch(act){
    case "tab": S.mode = v; S.panel = null; break;

    /* かずの しくみ */
    case "nt": S.num.ten = Math.max(0, Math.min(9, S.num.ten + Number(v))); S.num.msg=""; break;
    case "no": {
      S.num.one = Math.max(0, Math.min(19, S.num.one + Number(v)));
      S.num.msg = S.num.one>=10 ? "1が 10こ そろった。たばに できるよ。" : "";
      break;
    }
    case "nzero": S.num.ten=0; S.num.one=0; S.num.msg=""; break;
    case "bundle": S.num.ten++; S.num.one-=10; S.num.msg="たばに した。かずは かわらないよ。"; break;
    case "unbundle": S.num.ten--; S.num.one+=10; S.num.msg="ばらすと 1が 10こ。かずは かわらないよ。"; break;

    /* ひっさん */
    case "next": S[S.mode].i++; break;
    case "prev": S[S.mode].i--; break;
    case "reset": S[S.mode].i = 0; break;
    case "setq": {
      const a = Number($("#ia").value), b = Number($("#ib").value);
      if(!Number.isFinite(a)||!Number.isFinite(b)) break;
      if(S.mode==="sub" && (a>99 || a-b<0 || b>99)){ alert("ひきざんは 2けた、こたえが 0いじょうに なるように いれてね。"); break; }
      if(S.mode==="add" && (a+b>199)){ alert("こたえが 199までに なるように いれてね。"); break; }
      S[S.mode].a = Math.max(0,a); S[S.mode].b = Math.max(0,b); S[S.mode].i = 0; S.panel=null; S[S.mode].play=false;
      break;
    }
    case "rand": {
      if(S.mode==="add"){
        const a = 11+Math.floor(Math.random()*78), b = 11+Math.floor(Math.random()*78);
        S.add.a=a; S.add.b=b; S.add.i=0;
      }else{
        let a = 21+Math.floor(Math.random()*78), b = 11+Math.floor(Math.random()*(a-11));
        S.sub.a=a; S.sub.b=b; S.sub.i=0;
      }
      break;
    }

    /* パネル */
    case "openpanel": S.panel = "settings"; break;
    case "closepanel": S.panel = null; break;

    /* ゲーム */
    case "gtoggle": {
      const k=S.mode; S.panel=null; S[k].play = !S[k].play;
      if(S[k].play && !S[k].g.a) gInit(k); else S[k].i=0;
      break;
    }
    case "glevel": S[S.mode].g.level = v; gInit(S.mode); S.card.justFull=false; S.panel=null; break;
    case "gskip": gInit(S.mode); S.card.justFull=false; break;
    case "gact": {
      const k=S.mode, g=S[k].g; g.msg=""; g.ok=false; S.card.justFull=false;
      if(v==="next"){ gInit(k); break; }
      if(v==="yes"||v==="no"){
        const need = (g.a%10) < (g.b%10);
        if((v==="no")===need){ gStep(k); }
        else { g.tries++; g.ok=false;
          g.msg = need ? `一のくらいは ${g.a%10}こ だけ。${g.b%10}こは とれないね。`
                       : `一のくらいは ${g.a%10}こ ある。とれそうだね。`; }
        break;
      }
      gStep(k);
      break;
    }
    case "gkey": {
      const k=S.mode, g=S[k].g; S.card.justFull=false;
      const want=gExpect(k), got=Number(v);
      if(got===want){
        gStep(k);
        if(g.phase==="done") addStamp();
      }else{
        g.tries++; g.ok=false;
        g.msg = g.tries===1 ? "ブロックを かぞえて みよう。"
              : g.tries===2 ? "わくの なかが 10こ。そとが あまり。"
              : "みどりの ボタンを おしてみよう。";
      }
      break;
    }

    /* ながさ */
    case "cm": L.cm = Math.max(0, Math.min(RULER_CM(), L.cm + Number(v))); L.verdict=null; L.hint=""; break;
    case "mm": {
      let m = L.mm + Number(v);
      L.hint="";
      if(m>9){ m=0; L.cm=Math.min(RULER_CM(),L.cm+1); L.hint="10mm に なったから 1cm に くりあがったよ。"; }
      if(m<0){ if(L.cm>0){ m=9; L.cm--; L.hint="1cm を ばらすと 10mm。"; } else m=0; }
      L.mm = m; L.verdict=null; break;
    }
    case "key": {
      if(v==="del") L.pad = L.pad.slice(0,-1);
      else if(L.pad.length<3) L.pad += v;
      L.verdict=null; break;
    }
    case "lcheck": {
      if(L.kind==="read") L.verdict = (L.cm*10+L.mm === L.target) ? "ok":"ng";
      else { L.verdict = (Number(L.pad) === L.target) ? "ok":"ng"; if(L.verdict==="ok") L.spread=true; }
      break;
    }
    case "lnew": newLen(); break;
    case "lblocks": L.blocks = !L.blocks; break;
    case "lspread": L.spread = !L.spread; break;
    case "lkind": L.kind = v; L.verdict=null; L.pad=""; L.cm=0; L.mm=0; L.spread=false; break;
  }
  render();
});

document.addEventListener("change",(e)=>{
  const t = e.target.closest("[data-act='lhard']");
  if(!t) return;
  S.len.hard = t.checked; newLen(); render();
});

document.addEventListener("keydown",(e)=>{
  if(S.mode!=="add" && S.mode!=="sub") return;
  if(e.target.tagName==="INPUT") return;
  if(e.key===" "||e.key==="Enter"||e.key==="ArrowRight"){ e.preventDefault(); S[S.mode].i++; render(); }
  if(e.key==="ArrowLeft"){ e.preventDefault(); S[S.mode].i=Math.max(0,S[S.mode].i-1); render(); }
});

let rzT=null;
function onResize(){
  clearTimeout(rzT);
  rzT = setTimeout(()=>{
    const n = window.innerWidth < 600;
    if(n !== NARROW){ NARROW = n; newLen(); render(); }
    else fitStage();
  }, 180);
}
window.addEventListener("resize", onResize);
window.addEventListener("orientationchange", onResize);
if(window.visualViewport) window.visualViewport.addEventListener("resize", onResize);

newLen();
render();
</script>
